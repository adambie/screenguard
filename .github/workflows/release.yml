name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" crates/agent/Cargo.toml
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" crates/server/Cargo.toml

      - name: Build agent
        run: cross build --release -p agent --target ${{ matrix.target }}

      - name: Build server
        run: cross build --release -p server --target ${{ matrix.target }}

      - name: Build tray
        run: cross build --release -p tray --target ${{ matrix.target }}

      - name: Stage binaries
        run: |
          ARCH=$(echo "${{ matrix.target }}" | cut -d- -f1)
          mkdir -p dist
          cp target/${{ matrix.target }}/release/agent                    dist/screenguard-agent-${ARCH}
          cp target/${{ matrix.target }}/release/parental-controller-server dist/screenguard-server-${ARCH}
          cp target/${{ matrix.target }}/release/screenguard-tray          dist/screenguard-tray-${ARCH}
          chmod +x dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: dist/

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Bundle deploy files
        run: |
          cp deploy/screenguard-server.service dist/
          cp deploy/screenguard-agent.service  dist/
          cp deploy/screenguard-tray.desktop   dist/
          cp install.sh dist/

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          generate_release_notes: true
