name: Release Mobile

on:
  push:
    tags:
      - 'mobile*'

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        run: flutter pub get
        working-directory: mobile

      - name: Build APK
        run: |
          VERSION=${GITHUB_REF_NAME#mobile}
          flutter build apk --release --dart-define=APP_VERSION=${VERSION}
        working-directory: mobile

      - name: Stage APK
        run: |
          VERSION=${GITHUB_REF_NAME#mobile}
          mkdir -p dist
          mv mobile/build/app/outputs/flutter-apk/app-release.apk \
             dist/screenguard-android-${VERSION}.apk

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/screenguard-android-*.apk
          generate_release_notes: true
          make_latest: false
