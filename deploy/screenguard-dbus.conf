<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Allow root to own the agent service name -->
  <policy user="root">
    <allow own="org.screenguard.Agent"/>
  </policy>
  <!-- Allow any user to call the agent and receive its signals -->
  <policy context="default">
    <allow send_destination="org.screenguard.Agent"/>
    <allow receive_sender="org.screenguard.Agent"/>
  </policy>
</busconfig>
